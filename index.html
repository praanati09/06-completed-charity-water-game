<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fill the Future</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1 class="game-title">Fill the Future</h1>
    <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>

    <div class="score-panel">
      <div class="panel-item">Score: <span id="score">0</span></div>
      <div class="panel-item">Time: <span id="time">30</span>s</div>
      <div class="panel-item">Lives: <span id="lives">5 ❤️</span></div>

      <div class="panel-item difficulty-box">
        <label for="difficulty">Mode:</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="button-wrap">
        <button id="start-btn">Start Game</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>

    <div id="message">Press Start, then use the left and right arrow keys.</div>

    <div id="game-container">
      <div id="basket"></div>
    </div>

    <footer class="game-footer">
      <p>Learn more about charity: water:</p>
      <a href="https://www.charitywater.org/main" target="_blank">Official Website</a>
      <a href="https://www.charitywater.org/donate" target="_blank">Donate</a>
    </footer>
  </div>

  <audio id="catch-sound" src="catch.mp3"></audio>
  <audio id="miss-sound" src="miss.mp3"></audio>
  <audio id="win-sound" src="win.mp3"></audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
